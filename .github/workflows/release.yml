name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate release tag is semver
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"

          node -e "
            const version = '$VERSION';
            const semverRegex = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(-([\w.-]+))?(\+([\w.-]+))?$/;
            if (!semverRegex.test(version)) {
              console.error('Invalid release tag: $TAG. Expected semver like v1.2.3');
              process.exit(1);
            }
            console.log('Release tag is valid semver: ' + version);
          "

      - name: Bump version in package.json and source
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "Using release version: $VERSION"

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          sed -i "s/LOVELACE-AC-CARD \\\\n%c  v[0-9][^ ]*/LOVELACE-AC-CARD \\\\n%c  v$VERSION/" src/boilerplate-card.ts

      - name: Validate bumped version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")

          [ "$PKG_VERSION" = "$VERSION" ] || {
            echo "package.json version mismatch: expected '$VERSION', got '$PKG_VERSION'"
            exit 1
          }
          echo "Version validation passed: $VERSION"

      - name: Install dependencies
        run: |
          corepack enable
          corepack prepare yarn@4.12.0 --activate
          yarn install --immutable

      - name: Build
        run: yarn build

      - name: Upload release asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/lovelace-ac-card.js
          asset_name: lovelace-ac-card.js
          tag: ${{ github.event.release.tag_name }}
          overwrite: true
